<!DOCTYPE html>
<html>
<head>
  <title>Sistema de Alunos</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>Cadastro de Alunos</h1>

  <input type="hidden" id="id">

  <input type="text" id="nome" placeholder="Nome">
  <input type="email" id="email" placeholder="Email">
  <input type="number" id="idade" placeholder="Idade">

  <button class="btn-salvar" onclick="salvar()">Salvar</button>
  <button class="btn-listar" onclick="abrirModal()">Ver Alunos</button>
  <button class="btn-relatorio" onclick="abrirRelatorio()">Ver Relatório</button>

  <p id="mensagem"></p>

</div>

<!-- MODAL LISTA -->
<div id="modal" class="modal">
  <div class="modal-content">

    <span class="fechar" onclick="fecharModal()">&times;</span>

    <h2>Lista de Alunos</h2>

    <input type="text" id="busca" placeholder="Buscar aluno..." onkeyup="filtrar()">

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Email</th>
          <th>Idade</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>

    <h3 id="total"></h3>

  </div>
</div>

<!-- MODAL RELATÓRIO -->
<div id="modalRelatorio" class="modal">
  <div class="modal-content">

    <span class="fechar" onclick="fecharRelatorio()">&times;</span>

    <h2>Relatório de Alunos</h2>

    <p id="relTotal"></p>
    <p id="relMedia"></p>
    <p id="relMaior"></p>
    <p id="relMenor"></p>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase;
</script>
<script src="app.js"></script>

</body>
</html>
